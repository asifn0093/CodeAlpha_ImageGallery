<body>
    <header class="gallery-header">
        <h1>Image Gallery</h1>
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="architecture">Architecture</button>
            <button class="filter-btn" data-filter="food">Food</button>
            <button class="filter-btn" data-filter="travel">Travel</button>
        </div>
    </header>

    <main class="gallery-container" id="gallery"></main>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="closeBtn">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="prevBtn">&#10094;</button>
        <button class="lightbox-nav lightbox-next" id="nextBtn">&#10095;</button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImg">
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
